name: npm-publish

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/npm-publish.yml"
      - "codex-cli/**"
      - "codex-rs/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      version:
        description: "npm version to publish, for example 0.1.3"
        required: true
        default: "0.1.3"
      tag:
        description: "npm dist-tag for the root package"
        required: true
        default: "latest"

permissions:
  contents: read

env:
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
  CARGO_PROFILE_RELEASE_LTO: "off"
  CODEX_SKIP_VENDORED_BWRAP: "1"
  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  resolve-publish-settings:
    name: Resolve publish settings
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      should_publish: ${{ steps.resolve.outputs.should_publish }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@growthcircle"

      - name: Resolve version and npm tag
        id: resolve
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${INPUT_VERSION}"
            tag="${INPUT_TAG}"
          else
            version="$(node -p 'require("./codex-cli/package.json").version')"
            tag="latest"
          fi

          test -n "${version}" || {
            echo "Unable to resolve npm package version" >&2
            exit 1
          }
          test -n "${tag}" || tag="latest"

          should_publish="true"
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]] \
            && npm view "@growthcircle/growcli@${version}" version >/dev/null 2>&1; then
            should_publish="false"
            echo "@growthcircle/growcli@${version} already exists; skipping automatic publish"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
          {
            echo "### npm publish settings"
            echo
            echo "- version: ${version}"
            echo "- tag: ${tag}"
            echo "- should_publish: ${should_publish}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-native:
    name: Publish native npm package (${{ matrix.package_tag }})
    needs: resolve-publish-settings
    if: needs.resolve-publish-settings.outputs.should_publish == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_tag: linux-x64
            runner: ubuntu-24.04
            target_triple: x86_64-unknown-linux-musl
            cargo_target: x86_64-unknown-linux-musl
            package_os: linux
            package_cpu: x64
            binary_name: growcli
          - package_tag: darwin-x64
            runner: macos-15-intel
            target_triple: x86_64-apple-darwin
            cargo_target: x86_64-apple-darwin
            package_os: darwin
            package_cpu: x64
            binary_name: growcli
          - package_tag: darwin-arm64
            runner: macos-15
            target_triple: aarch64-apple-darwin
            cargo_target: aarch64-apple-darwin
            package_os: darwin
            package_cpu: arm64
            binary_name: growcli
          - package_tag: win32-x64
            runner: windows-2025
            target_triple: x86_64-pc-windows-msvc
            cargo_target: x86_64-pc-windows-msvc
            package_os: win32
            package_cpu: x64
            binary_name: growcli.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - if: ${{ matrix.cargo_target == '' }}
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0

      - if: ${{ matrix.cargo_target != '' }}
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.cargo_target }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@growthcircle"

      - if: ${{ endsWith(matrix.cargo_target, '-unknown-linux-musl') }}
        name: Use hermetic Cargo home (musl)
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - if: ${{ endsWith(matrix.cargo_target, '-unknown-linux-musl') }}
        name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.0

      - if: ${{ endsWith(matrix.cargo_target, '-unknown-linux-musl') }}
        name: Install musl build tools
        shell: bash
        env:
          TARGET: ${{ matrix.cargo_target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - if: ${{ endsWith(matrix.cargo_target, '-unknown-linux-musl') }}
        name: Clear sanitizer flags (musl)
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.cargo_target }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

      - if: ${{ endsWith(matrix.cargo_target, '-unknown-linux-musl') }}
        name: Configure musl rusty_v8 artifact overrides and verify checksums
        uses: ./.github/actions/setup-rusty-v8-musl
        with:
          target: ${{ matrix.cargo_target }}

      - name: Build Grow CLI
        shell: bash
        working-directory: codex-rs
        env:
          CARGO_TARGET: ${{ matrix.cargo_target }}
        run: |
          set -euo pipefail
          build_args=(--release -p codex-cli --bin growcli)
          if [[ -n "${CARGO_TARGET}" ]]; then
            build_args+=(--target "${CARGO_TARGET}")
          fi
          cargo build "${build_args[@]}"

      - name: Stage native package
        shell: bash
        env:
          VERSION: ${{ needs.resolve-publish-settings.outputs.version }}
          PACKAGE_TAG: ${{ matrix.package_tag }}
          TARGET_TRIPLE: ${{ matrix.target_triple }}
          CARGO_TARGET: ${{ matrix.cargo_target }}
          PACKAGE_OS: ${{ matrix.package_os }}
          PACKAGE_CPU: ${{ matrix.package_cpu }}
          BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          set -euo pipefail
          platform_version="${VERSION}-${PACKAGE_TAG}"
          runner_temp="${RUNNER_TEMP}"
          if command -v cygpath >/dev/null 2>&1; then
            runner_temp="$(cygpath -u "${RUNNER_TEMP}")"
          fi
          stage="${runner_temp}/growcli-native-${PACKAGE_TAG}"
          rm -rf "${stage}"
          mkdir -p "${stage}/vendor/${TARGET_TRIPLE}/codex" dist

          if [[ -n "${CARGO_TARGET}" ]]; then
            source_binary="codex-rs/target/${CARGO_TARGET}/release/${BINARY_NAME}"
          else
            source_binary="codex-rs/target/release/${BINARY_NAME}"
          fi
          cp "${source_binary}" "${stage}/vendor/${TARGET_TRIPLE}/codex/${BINARY_NAME}"
          if [[ "${BINARY_NAME}" != *.exe ]]; then
            chmod 755 "${stage}/vendor/${TARGET_TRIPLE}/codex/${BINARY_NAME}"
          fi
          cp README.md "${stage}/README.md"

          cat > "${stage}/package.json" <<EOF
          {
            "name": "@growthcircle/growcli",
            "version": "${platform_version}",
            "description": "Native Grow CLI binary for ${PACKAGE_TAG}",
            "license": "Apache-2.0",
            "os": ["${PACKAGE_OS}"],
            "cpu": ["${PACKAGE_CPU}"],
            "engines": {
              "node": ">=16"
            },
            "files": [
              "vendor",
              "README.md"
            ],
            "repository": {
              "type": "git",
              "url": "git+https://github.com/Growth-Circle/growcli.git"
            }
          }
          EOF

          npm pack "${stage}" --pack-destination dist

      - name: Publish native package
        shell: bash
        env:
          PACKAGE_TAG: ${{ matrix.package_tag }}
        run: |
          set -euo pipefail
          test -n "${NODE_AUTH_TOKEN}" || {
            echo "NPM_TOKEN secret is required to publish @growthcircle/growcli"
            exit 1
          }

          tarball="$(ls dist/growthcircle-growcli-*.tgz | head -n 1)"
          tarball="$(node -e 'console.log(require("path").resolve(process.argv[1]))' "${tarball}")"
          set +e
          publish_output="$(npm publish "${tarball}" --access public --tag "${PACKAGE_TAG}" 2>&1)"
          publish_status=$?
          set -e

          echo "${publish_output}"
          if [[ ${publish_status} -eq 0 ]]; then
            exit 0
          fi

          if grep -qiE "previously published|cannot publish over|version already exists" <<< "${publish_output}"; then
            echo "Skipping already-published native package for ${PACKAGE_TAG}"
            exit 0
          fi

          exit "${publish_status}"

  publish-root:
    name: Publish root npm package
    needs: [resolve-publish-settings, publish-native]
    if: needs.resolve-publish-settings.outputs.should_publish == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@growthcircle"

      - name: Stage root package
        shell: bash
        env:
          VERSION: ${{ needs.resolve-publish-settings.outputs.version }}
        run: |
          set -euo pipefail
          stage="${RUNNER_TEMP}/growcli-root"
          rm -rf "${stage}"
          mkdir -p "${stage}/bin" dist

          cp codex-cli/bin/codex.js "${stage}/bin/codex.js"
          cp README.md "${stage}/README.md"

          cat > "${stage}/package.json" <<EOF
          {
            "name": "@growthcircle/growcli",
            "version": "${VERSION}",
            "description": "GrowthCircle coding agent CLI",
            "license": "Apache-2.0",
            "type": "module",
            "bin": {
              "growcli": "bin/codex.js",
              "grow": "bin/codex.js"
            },
            "engines": {
              "node": ">=16"
            },
            "files": [
              "bin",
              "README.md"
            ],
            "optionalDependencies": {
              "@growthcircle/growcli-linux-x64": "npm:@growthcircle/growcli@${VERSION}-linux-x64",
              "@growthcircle/growcli-darwin-x64": "npm:@growthcircle/growcli@${VERSION}-darwin-x64",
              "@growthcircle/growcli-darwin-arm64": "npm:@growthcircle/growcli@${VERSION}-darwin-arm64",
              "@growthcircle/growcli-win32-x64": "npm:@growthcircle/growcli@${VERSION}-win32-x64"
            },
            "repository": {
              "type": "git",
              "url": "git+https://github.com/Growth-Circle/growcli.git"
            }
          }
          EOF

          npm pack "${stage}" --pack-destination dist

      - name: Publish root package
        shell: bash
        env:
          TAG: ${{ needs.resolve-publish-settings.outputs.tag }}
        run: |
          set -euo pipefail
          test -n "${NODE_AUTH_TOKEN}" || {
            echo "NPM_TOKEN secret is required to publish @growthcircle/growcli"
            exit 1
          }

          tarball="$(ls dist/growthcircle-growcli-*.tgz | head -n 1)"
          tarball="$(node -e 'console.log(require("path").resolve(process.argv[1]))' "${tarball}")"
          publish_args=(npm publish "${tarball}" --access public)
          if [[ -n "${TAG}" ]]; then
            publish_args+=(--tag "${TAG}")
          fi

          set +e
          publish_output="$("${publish_args[@]}" 2>&1)"
          publish_status=$?
          set -e

          echo "${publish_output}"
          if [[ ${publish_status} -eq 0 ]]; then
            exit 0
          fi

          if grep -qiE "previously published|cannot publish over|version already exists" <<< "${publish_output}"; then
            echo "Skipping already-published root package"
            exit 0
          fi

          exit "${publish_status}"

  verify-install:
    name: Verify npm install (${{ matrix.package_tag }})
    needs: [resolve-publish-settings, publish-root]
    if: needs.resolve-publish-settings.outputs.should_publish == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_tag: linux-x64
            runner: ubuntu-24.04
          - package_tag: darwin-x64
            runner: macos-15-intel
          - package_tag: darwin-arm64
            runner: macos-15
          - package_tag: win32-x64
            runner: windows-2025

    steps:
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@growthcircle"

      - name: Install and run Grow CLI
        shell: bash
        env:
          VERSION: ${{ needs.resolve-publish-settings.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if npm view "@growthcircle/growcli@${VERSION}" version >/dev/null 2>&1; then
              break
            fi
            if [[ "${attempt}" -eq 12 ]]; then
              echo "@growthcircle/growcli@${VERSION} is not visible in npm yet"
              exit 1
            fi
            echo "Waiting for @growthcircle/growcli@${VERSION} to propagate to npm (attempt ${attempt}/12)"
            sleep 10
          done
          npm exec --yes --package "@growthcircle/growcli@${VERSION}" -- growcli --version

      - if: ${{ matrix.package_tag == 'linux-x64' }}
        name: Verify on Debian 12
        shell: bash
        env:
          VERSION: ${{ needs.resolve-publish-settings.outputs.version }}
        run: |
          set -euo pipefail
          docker run --rm node:22-bookworm bash -lc \
            "npm exec --yes --package '@growthcircle/growcli@${VERSION}' -- growcli --version"
