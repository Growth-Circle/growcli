name: npm-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm version to publish, for example 0.1.0"
        required: true
        default: "0.1.0"
      tag:
        description: "npm dist-tag"
        required: true
        default: "latest"

permissions:
  contents: read

jobs:
  publish-linux-x64:
    name: Publish Linux x64 npm package
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_LTO: "off"
      CODEX_SKIP_VENDORED_BWRAP: "1"
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0

      - name: Build Grow CLI
        working-directory: codex-rs
        run: cargo build --release -p codex-cli --bin growcli

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@growthcircle"

      - name: Stage npm package
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          stage="${RUNNER_TEMP}/growcli-npm"
          target="x86_64-unknown-linux-musl"
          rm -rf "$stage"
          mkdir -p "$stage/bin" "$stage/vendor/${target}/codex"
          mkdir -p dist

          cp codex-cli/bin/codex.js "$stage/bin/codex.js"
          cp README.md "$stage/README.md"
          cp codex-rs/target/release/growcli "$stage/vendor/${target}/codex/growcli"
          chmod 755 "$stage/vendor/${target}/codex/growcli"

          cat > "$stage/package.json" <<EOF
          {
            "name": "@growthcircle/growcli",
            "version": "${VERSION}",
            "description": "GrowthCircle coding agent CLI",
            "license": "Apache-2.0",
            "type": "module",
            "bin": {
              "growcli": "bin/codex.js",
              "grow": "bin/codex.js"
            },
            "os": ["linux"],
            "cpu": ["x64"],
            "engines": {
              "node": ">=16"
            },
            "files": [
              "bin",
              "vendor",
              "README.md"
            ],
            "repository": {
              "type": "git",
              "url": "git+https://github.com/Growth-Circle/growcli.git"
            }
          }
          EOF

          node "$stage/bin/codex.js" --version
          npm pack "$stage" --pack-destination dist

      - name: Publish npm package
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          test -n "${NODE_AUTH_TOKEN}" || {
            echo "NPM_TOKEN secret is required to publish @growthcircle/growcli"
            exit 1
          }
          tarball="$(realpath "$(ls dist/growthcircle-growcli-*.tgz | head -n 1)")"
          npm publish "$tarball" --access public --tag "$TAG"
